<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="60" y1="40" x2="140" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- SD card body (microSD shape) -->
  <g filter="url(#shadow)">
    <!-- Main card body -->
    <path d="M72 44 L120 44 L140 64 L140 156 Q140 162 134 162 L66 162 Q60 162 60 156 L60 50 Q60 44 66 44 Z"
          fill="url(#card)"/>
    <!-- Diagonal notch at top-right -->
    <path d="M120 44 L140 64 L120 64 Z" fill="#c7d2fe" opacity="0.6"/>

    <!-- Gold contact pads -->
    <rect x="70" y="140" width="8" height="14" rx="2" fill="#f59e0b" opacity="0.9"/>
    <rect x="82" y="140" width="8" height="14" rx="2" fill="#f59e0b" opacity="0.9"/>
    <rect x="94" y="140" width="8" height="14" rx="2" fill="#f59e0b" opacity="0.9"/>
    <rect x="106" y="140" width="8" height="14" rx="2" fill="#f59e0b" opacity="0.9"/>
    <rect x="118" y="140" width="8" height="14" rx="2" fill="#f59e0b" opacity="0.9"/>

    <!-- D letter on card -->
    <text x="100" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="54" font-weight="800" fill="#4f46e5" opacity="0.9">D</text>

    <!-- Small "V" subtitle -->
    <text x="100" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="13" font-weight="600" letter-spacing="3" fill="#6366f1" opacity="0.7">VAULT</text>
  </g>
</svg>
